<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Animated monochrome space banner</title>
  <desc id="desc">A black and white animated space scene with drifting stars, orbit paths, moon silhouettes, and scanlines.</desc>
  <defs>
    <radialGradient id="void" cx="50%" cy="45%" r="80%">
      <stop offset="0%" stop-color="#1b1b1b" />
      <stop offset="42%" stop-color="#070707" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.34" />
      <stop offset="38%" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" />
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="scan" width="1" height="7" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#ffffff" opacity="0.09" />
    </pattern>
    <clipPath id="frame">
      <rect x="24" y="24" width="1152" height="372" rx="28" />
    </clipPath>
    <clipPath id="bigPlanetClip">
      <circle cx="500" cy="210" r="58" />
    </clipPath>
    <clipPath id="smallPlanetClip">
      <circle cx="720" cy="212" r="34" />
    </clipPath>
  </defs>

  <rect width="1200" height="420" fill="#000" />
  <g clip-path="url(#frame)">
    <rect width="1200" height="420" fill="url(#void)" />
    <circle cx="600" cy="206" r="310" fill="url(#halo)">
      <animate attributeName="r" values="280;335;280" dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.60;1;0.60" dur="8s" repeatCount="indefinite" />
    </circle>

    <g opacity="0.85">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0;-120 40;0 0" dur="28s" repeatCount="indefinite" />
        <circle cx="96" cy="74" r="1.7" fill="#fff"><animate attributeName="opacity" values="0.15;0.95;0.15" dur="3.4s" repeatCount="indefinite" /></circle>
        <circle cx="182" cy="274" r="1.2" fill="#fff"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.7s" repeatCount="indefinite" /></circle>
        <circle cx="306" cy="118" r="2.2" fill="#fff"><animate attributeName="opacity" values="0.25;1;0.25" dur="4.2s" repeatCount="indefinite" /></circle>
        <circle cx="420" cy="338" r="1.4" fill="#fff"><animate attributeName="opacity" values="1;0.18;1" dur="3.1s" repeatCount="indefinite" /></circle>
        <circle cx="762" cy="96" r="1.8" fill="#fff"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.8s" repeatCount="indefinite" /></circle>
        <circle cx="930" cy="322" r="1.1" fill="#fff"><animate attributeName="opacity" values="0.85;0.15;0.85" dur="2.9s" repeatCount="indefinite" /></circle>
        <circle cx="1092" cy="148" r="2" fill="#fff"><animate attributeName="opacity" values="0.18;0.95;0.18" dur="3.6s" repeatCount="indefinite" /></circle>
      </g>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0;90 -22;0 0" dur="34s" repeatCount="indefinite" />
        <circle cx="132" cy="352" r="1" fill="#fff" />
        <circle cx="536" cy="62" r="1.4" fill="#fff" />
        <circle cx="682" cy="356" r="1.2" fill="#fff" />
        <circle cx="842" cy="176" r="1.6" fill="#fff" />
        <circle cx="1044" cy="264" r="1.2" fill="#fff" />
        <circle cx="1164" cy="76" r="1.1" fill="#fff" />
      </g>
    </g>

    <g transform="translate(600 210)" fill="none" stroke="#fff" stroke-linecap="round">
      <ellipse rx="382" ry="76" stroke-opacity="0.32" stroke-width="1.5" />
      <ellipse rx="276" ry="144" stroke-opacity="0.22" stroke-width="1.3" transform="rotate(-14)" />
      <ellipse rx="168" ry="230" stroke-opacity="0.16" stroke-width="1.2" transform="rotate(31)" />
      <g filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="19s" repeatCount="indefinite" />
        <circle cx="382" cy="0" r="5" fill="#fff" />
        <circle cx="-382" cy="0" r="2.4" fill="#fff" opacity="0.45" />
      </g>
      <g filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="27s" repeatCount="indefinite" />
        <circle cx="0" cy="-230" r="4" fill="#fff" opacity="0.82" />
        <circle cx="0" cy="230" r="2" fill="#fff" opacity="0.36" />
      </g>
    </g>

    <g filter="url(#soft)">
      <circle cx="482" cy="210" r="76" fill="#fff" opacity="0.12">
        <animate attributeName="opacity" values="0.08;0.18;0.08" dur="6s" repeatCount="indefinite" />
      </circle>
      <circle cx="728" cy="210" r="58" fill="#fff" opacity="0.08">
        <animate attributeName="opacity" values="0.04;0.14;0.04" dur="7.4s" repeatCount="indefinite" />
      </circle>
    </g>

    <g opacity="0.82">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0 500 210" to="360 500 210" dur="18s" repeatCount="indefinite" />
        <circle cx="500" cy="210" r="58" fill="#dcdcdc" />
        <g clip-path="url(#bigPlanetClip)" fill="none" stroke="#fff" stroke-opacity="0.24" stroke-width="3">
          <path d="M438 188 C474 176, 524 176, 562 190" />
          <path d="M432 212 C472 226, 526 226, 568 212" />
          <path d="M444 238 C484 252, 526 250, 560 236" />
        </g>
        <circle cx="524" cy="192" r="58" fill="#000" />
      </g>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="360 720 212" to="0 720 212" dur="12s" repeatCount="indefinite" />
        <circle cx="720" cy="212" r="34" fill="#f1f1f1" opacity="0.78" />
        <g clip-path="url(#smallPlanetClip)" fill="none" stroke="#fff" stroke-opacity="0.22" stroke-width="2">
          <path d="M684 200 C704 192, 732 192, 756 202" />
          <path d="M682 218 C704 226, 734 226, 758 216" />
        </g>
        <circle cx="736" cy="202" r="34" fill="#000" />
      </g>
    </g>

    <path d="M-120 330 C180 272, 338 382, 606 314 S1006 250,1320 326" fill="none" stroke="#fff" stroke-opacity="0.14" stroke-width="2" stroke-dasharray="2 14">
      <animate attributeName="stroke-dashoffset" values="0;-96" dur="9s" repeatCount="indefinite" />
    </path>
    <rect width="1200" height="420" fill="url(#scan)" opacity="0.55" />
    <rect x="0" y="-62" width="1200" height="42" fill="#fff" opacity="0.045">
      <animate attributeName="y" values="-62;430" dur="5.8s" repeatCount="indefinite" />
    </rect>
  </g>

  <rect x="24" y="24" width="1152" height="372" rx="28" fill="none" stroke="#fff" stroke-opacity="0.72" stroke-width="2" />
  <rect x="36" y="36" width="1128" height="348" rx="20" fill="none" stroke="#fff" stroke-opacity="0.18" stroke-width="1" />
</svg>

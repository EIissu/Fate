<svg xmlns="http://www.w3.org/2000/svg" width="720" height="150" viewBox="0 0 720 150" role="img" aria-labelledby="title desc">
  <title id="title">Download Fateful Hub button</title>
  <desc id="desc">Animated neon download button for the Fateful Windows hub.</desc>
  <defs>
    <linearGradient id="buttonFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0c1434" />
      <stop offset="50%" stop-color="#22104a" />
      <stop offset="100%" stop-color="#051e34" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="704" height="134" rx="20" fill="#02040d" />
  <rect x="18" y="18" width="684" height="114" rx="16" fill="url(#buttonFill)" stroke="#6ed8ff" stroke-width="3" filter="url(#glow)" />
  <rect x="28" y="28" width="664" height="94" rx="10" fill="none" stroke="#ff5be7" stroke-width="2" stroke-dasharray="22 16">
    <animate attributeName="stroke-dashoffset" from="0" to="-152" dur="3.5s" repeatCount="indefinite" />
  </rect>

  <g transform="translate(74 75)" filter="url(#glow)">
    <path d="M0 -30 H42 V6 H62 L21 42 -20 6 H0 Z" fill="#ffe879">
      <animateTransform attributeName="transform" type="translate" values="0 -4;0 5;0 -4" dur="1.6s" repeatCount="indefinite" />
    </path>
  </g>

  <g font-family="Consolas, Monaco, monospace" text-anchor="middle">
    <text x="405" y="68" font-size="34" font-weight="800" fill="#eaf8ff" letter-spacing="2">DOWNLOAD FATEFUL HUB</text>
    <text x="405" y="104" font-size="18" fill="#8fe6ff" letter-spacing="4">WINDOWS X64 / EXE ONLY ZIP</text>
  </g>

  <rect x="35" y="30" width="8" height="90" fill="#6ed8ff" opacity="0.7">
    <animate attributeName="opacity" values="0.15;0.9;0.15" dur="1.2s" repeatCount="indefinite" />
  </rect>
  <rect x="678" y="30" width="8" height="90" fill="#ff5be7" opacity="0.7">
    <animate attributeName="opacity" values="0.9;0.15;0.9" dur="1.2s" repeatCount="indefinite" />
  </rect>
</svg>

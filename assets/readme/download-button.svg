<svg xmlns="http://www.w3.org/2000/svg" width="720" height="150" viewBox="0 0 720 150" role="img" aria-labelledby="title desc">
  <title id="title">Animated monochrome download portal</title>
  <desc id="desc">A black and white wordless animated portal button with stars and a downward arrow symbol.</desc>
  <defs>
    <filter id="glow" x="-50%" y="-90%" width="200%" height="280%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="dust" width="36" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="3" r="1" fill="#fff" opacity="0.25" />
      <circle cx="24" cy="12" r="0.8" fill="#fff" opacity="0.18" />
    </pattern>
  </defs>

  <rect width="720" height="150" rx="24" fill="#000" />
  <rect x="18" y="18" width="684" height="114" rx="18" fill="#070707" stroke="#fff" stroke-opacity="0.72" stroke-width="2" />
  <rect x="28" y="28" width="664" height="94" rx="12" fill="url(#dust)" opacity="0.85">
    <animateTransform attributeName="transform" type="translate" values="0 0;-36 18;0 0" dur="8s" repeatCount="indefinite" />
  </rect>
  <rect x="32" y="32" width="656" height="86" rx="10" fill="none" stroke="#fff" stroke-opacity="0.36" stroke-width="1" stroke-dasharray="10 18">
    <animate attributeName="stroke-dashoffset" values="0;-112" dur="4s" repeatCount="indefinite" />
  </rect>

  <g transform="translate(360 75)" filter="url(#glow)">
    <circle r="44" fill="none" stroke="#fff" stroke-opacity="0.68" stroke-width="2" />
    <circle r="26" fill="none" stroke="#fff" stroke-opacity="0.28" stroke-width="2" stroke-dasharray="4 9">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite" />
    </circle>
    <path d="M-7 -18 H7 V8 H22 L0 29 -22 8 H-7 Z" fill="#fff">
      <animateTransform attributeName="transform" type="translate" values="0 -4;0 5;0 -4" dur="1.7s" repeatCount="indefinite" />
    </path>
  </g>

  <g fill="#fff" opacity="0.75">
    <circle cx="92" cy="44" r="2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.2s" repeatCount="indefinite" /></circle>
    <circle cx="134" cy="104" r="1.3"><animate attributeName="opacity" values="0.9;0.15;0.9" dur="2.8s" repeatCount="indefinite" /></circle>
    <circle cx="580" cy="42" r="1.6"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="2.4s" repeatCount="indefinite" /></circle>
    <circle cx="628" cy="102" r="2.1"><animate attributeName="opacity" values="0.85;0.18;0.85" dur="3s" repeatCount="indefinite" /></circle>
  </g>
  <rect x="18" y="18" width="684" height="114" rx="18" fill="none" stroke="#fff" stroke-opacity="0.18" stroke-width="7" />
</svg>

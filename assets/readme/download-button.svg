<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="170" viewBox="0 0 1200 170" role="img" aria-labelledby="title desc">
  <title id="title">Animated monochrome solar system release link</title>
  <desc id="desc">A black and white wordless animated solar system strip with orbiting planets and drifting stars.</desc>
  <defs>
    <filter id="glow" x="-35%" y="-90%" width="170%" height="280%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="dust" width="42" height="24" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="0.8" fill="#fff" opacity="0.28" />
      <circle cx="28" cy="16" r="0.7" fill="#fff" opacity="0.18" />
    </pattern>
    <clipPath id="innerFrame">
      <rect x="24" y="18" width="1152" height="134" rx="20" />
    </clipPath>
  </defs>

  <rect width="1200" height="170" rx="24" fill="#000" />
  <rect x="12" y="10" width="1176" height="150" rx="22" fill="#050505" stroke="#fff" stroke-opacity="0.56" stroke-width="2" />
  <g clip-path="url(#innerFrame)">
    <rect x="0" y="0" width="1200" height="170" fill="url(#dust)" opacity="0.85">
      <animateTransform attributeName="transform" type="translate" values="0 0;-42 0;0 0" dur="16s" repeatCount="indefinite" />
    </rect>
    <path d="M44 88 C220 44, 390 126, 566 86 S914 42, 1156 88" fill="none" stroke="#fff" stroke-opacity="0.16" stroke-width="1.4" stroke-dasharray="2 13">
      <animate attributeName="stroke-dashoffset" values="0;-92" dur="7s" repeatCount="indefinite" />
    </path>
    <path d="M44 94 H1156" fill="none" stroke="#fff" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="10 18">
      <animate attributeName="stroke-dashoffset" values="0;-112" dur="6s" repeatCount="indefinite" />
    </path>

    <g filter="url(#glow)">
      <circle cx="600" cy="85" r="30" fill="#f2f2f2">
        <animate attributeName="r" values="28;33;28" dur="4.8s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.86;1;0.86" dur="4.8s" repeatCount="indefinite" />
      </circle>
      <circle cx="600" cy="85" r="46" fill="none" stroke="#fff" stroke-opacity="0.14" stroke-width="2">
        <animate attributeName="r" values="42;51;42" dur="4.8s" repeatCount="indefinite" />
        <animate attributeName="stroke-opacity" values="0.08;0.22;0.08" dur="4.8s" repeatCount="indefinite" />
      </circle>
    </g>

    <g fill="#fff" filter="url(#glow)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0;18 -6;0 0" dur="6.2s" repeatCount="indefinite" />
        <circle cx="160" cy="93" r="8" opacity="0.72" />
      </g>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0;-22 7;0 0" dur="7.4s" repeatCount="indefinite" />
        <circle cx="282" cy="66" r="12" opacity="0.58" />
        <circle cx="287" cy="62" r="12" fill="#000" opacity="0.75" />
      </g>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0;14 8;0 0" dur="8.5s" repeatCount="indefinite" />
        <circle cx="410" cy="105" r="15" opacity="0.66" />
        <path d="M394 101 C404 94, 420 94, 430 102" fill="none" stroke="#000" stroke-opacity="0.42" stroke-width="3" />
      </g>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0;-18 -5;0 0" dur="7.8s" repeatCount="indefinite" />
        <circle cx="762" cy="101" r="14" opacity="0.60" />
        <circle cx="769" cy="96" r="14" fill="#000" opacity="0.70" />
      </g>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0;24 -8;0 0" dur="9.2s" repeatCount="indefinite" />
        <circle cx="902" cy="63" r="18" opacity="0.70" />
        <ellipse cx="902" cy="63" rx="31" ry="8" fill="none" stroke="#fff" stroke-opacity="0.36" stroke-width="2" />
      </g>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0;-14 6;0 0" dur="6.8s" repeatCount="indefinite" />
        <circle cx="1050" cy="94" r="9" opacity="0.56" />
      </g>
    </g>

    <rect x="0" y="0" width="1200" height="170" fill="none" stroke="#fff" stroke-opacity="0.08" stroke-width="20" />
  </g>
  <rect x="22" y="18" width="1156" height="134" rx="20" fill="none" stroke="#fff" stroke-opacity="0.34" stroke-width="1.5" />
  <rect x="32" y="28" width="1136" height="114" rx="15" fill="none" stroke="#fff" stroke-opacity="0.18" stroke-width="1" stroke-dasharray="16 14">
    <animate attributeName="stroke-dashoffset" values="0;-120" dur="6s" repeatCount="indefinite" />
  </rect>
</svg>

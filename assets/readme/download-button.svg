<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="170" viewBox="0 0 1200 170" role="img" aria-labelledby="title desc">
  <title id="title">Animated monochrome star field release link</title>
  <desc id="desc">A black and white wordless animated star field strip for the release link.</desc>
  <defs>
    <filter id="glow" x="-40%" y="-120%" width="180%" height="340%">
      <feGaussianBlur stdDeviation="2.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="fade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#000" />
      <stop offset="0.5" stop-color="#090909" />
      <stop offset="1" stop-color="#000" />
    </linearGradient>
    <pattern id="starsA" width="54" height="34" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="9" r="0.9" fill="#fff" opacity="0.44" />
      <circle cx="26" cy="25" r="0.65" fill="#fff" opacity="0.26" />
      <circle cx="45" cy="14" r="0.75" fill="#fff" opacity="0.34" />
    </pattern>
    <pattern id="starsB" width="92" height="52" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="16" r="1.2" fill="#fff" opacity="0.30" />
      <circle cx="70" cy="35" r="0.8" fill="#fff" opacity="0.22" />
    </pattern>
    <clipPath id="innerFrame">
      <rect x="24" y="18" width="1152" height="134" rx="20" />
    </clipPath>
  </defs>

  <g clip-path="url(#innerFrame)">
    <rect width="1200" height="170" fill="url(#fade)" />
    <rect width="1200" height="170" fill="url(#starsA)" opacity="0.88">
      <animateTransform attributeName="transform" type="translate" values="0 0;-54 0;0 0" dur="16s" repeatCount="indefinite" />
    </rect>
    <rect width="1200" height="170" fill="url(#starsB)" opacity="0.72">
      <animateTransform attributeName="transform" type="translate" values="0 0;92 -18;0 0" dur="24s" repeatCount="indefinite" />
    </rect>

    <g fill="#fff" filter="url(#glow)">
      <circle cx="116" cy="74" r="1.8"><animate attributeName="opacity" values="0.16;0.94;0.16" dur="3.1s" repeatCount="indefinite" /></circle>
      <circle cx="188" cy="112" r="1.2"><animate attributeName="opacity" values="0.82;0.18;0.82" dur="2.6s" repeatCount="indefinite" /></circle>
      <circle cx="274" cy="52" r="1.5"><animate attributeName="opacity" values="0.25;1;0.25" dur="3.8s" repeatCount="indefinite" /></circle>
      <circle cx="354" cy="94" r="1"><animate attributeName="opacity" values="0.86;0.24;0.86" dur="2.9s" repeatCount="indefinite" /></circle>
      <circle cx="450" cy="64" r="2.2"><animate attributeName="opacity" values="0.2;0.92;0.2" dur="4.2s" repeatCount="indefinite" /></circle>
      <circle cx="532" cy="118" r="1.3"><animate attributeName="opacity" values="0.74;0.2;0.74" dur="3.4s" repeatCount="indefinite" /></circle>
      <circle cx="620" cy="78" r="1.8"><animate attributeName="opacity" values="0.18;1;0.18" dur="3.6s" repeatCount="indefinite" /></circle>
      <circle cx="704" cy="108" r="1.1"><animate attributeName="opacity" values="0.86;0.22;0.86" dur="2.7s" repeatCount="indefinite" /></circle>
      <circle cx="792" cy="55" r="1.5"><animate attributeName="opacity" values="0.24;0.92;0.24" dur="3.9s" repeatCount="indefinite" /></circle>
      <circle cx="872" cy="100" r="1.2"><animate attributeName="opacity" values="0.80;0.18;0.80" dur="3.2s" repeatCount="indefinite" /></circle>
      <circle cx="974" cy="66" r="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.4s" repeatCount="indefinite" /></circle>
      <circle cx="1082" cy="116" r="1.4"><animate attributeName="opacity" values="0.76;0.2;0.76" dur="2.8s" repeatCount="indefinite" /></circle>
    </g>

    <g filter="url(#glow)">
      <circle cx="0" cy="0" r="2.6" fill="#fff" />
      <path d="M-70 0 H-10" stroke="#fff" stroke-opacity="0.44" stroke-width="2" stroke-linecap="round" />
      <animateMotion dur="7.8s" repeatCount="indefinite" path="M80 42 C284 118, 514 32, 738 78 S1020 128,1140 56" />
    </g>

    <rect width="1200" height="170" fill="#fff" opacity="0.018">
      <animate attributeName="opacity" values="0.012;0.034;0.012" dur="5.5s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>

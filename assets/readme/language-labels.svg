<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="150" viewBox="0 0 1200 150" role="img" aria-labelledby="title desc">
  <title id="title">Fateful stack labels</title>
  <desc id="desc">Black and white space themed labels listing C++20, Win32 API, WebView2, HTML/CSS/JS, PowerShell, and JSON.</desc>
  <defs>
    <filter id="glow" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="stars" width="46" height="24" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="0.9" fill="#fff" opacity="0.38" />
      <circle cx="30" cy="16" r="0.7" fill="#fff" opacity="0.20" />
    </pattern>
  </defs>

  <rect width="1200" height="150" rx="22" fill="#000" />
  <rect x="10" y="10" width="1180" height="130" rx="18" fill="#050505" stroke="#fff" stroke-opacity="0.46" />
  <rect x="18" y="18" width="1164" height="114" rx="14" fill="url(#stars)" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0 0;-46 0;0 0" dur="14s" repeatCount="indefinite" />
  </rect>

  <path d="M76 75 C206 38, 326 112, 456 75 S706 38, 836 75 1058 112,1124 75" fill="none" stroke="#fff" stroke-opacity="0.16" stroke-width="1.4" stroke-dasharray="2 13">
    <animate attributeName="stroke-dashoffset" values="0;-90" dur="6s" repeatCount="indefinite" />
  </path>

  <g font-family="Consolas, Monaco, monospace" font-size="22" font-weight="700" fill="#fff" text-anchor="middle" filter="url(#glow)">
    <g transform="translate(114 75)">
      <rect x="-70" y="-25" width="140" height="50" rx="12" fill="#000" stroke="#fff" stroke-opacity="0.70" stroke-width="2" />
      <text y="8">C++20</text>
      <circle cx="-50" cy="0" r="3" fill="#fff"><animate attributeName="opacity" values="0.25;1;0.25" dur="2.2s" repeatCount="indefinite" /></circle>
    </g>
    <g transform="translate(292 75)">
      <rect x="-88" y="-25" width="176" height="50" rx="12" fill="#000" stroke="#fff" stroke-opacity="0.62" stroke-width="2" />
      <text y="8">Win32 API</text>
      <circle cx="-68" cy="0" r="3" fill="#fff"><animate attributeName="opacity" values="1;0.25;1" dur="2.6s" repeatCount="indefinite" /></circle>
    </g>
    <g transform="translate(480 75)">
      <rect x="-82" y="-25" width="164" height="50" rx="12" fill="#000" stroke="#fff" stroke-opacity="0.70" stroke-width="2" />
      <text y="8">WebView2</text>
      <circle cx="-62" cy="0" r="3" fill="#fff"><animate attributeName="opacity" values="0.20;0.95;0.20" dur="2.4s" repeatCount="indefinite" /></circle>
    </g>
    <g transform="translate(684 75)">
      <rect x="-100" y="-25" width="200" height="50" rx="12" fill="#000" stroke="#fff" stroke-opacity="0.62" stroke-width="2" />
      <text y="8">HTML/CSS/JS</text>
      <circle cx="-80" cy="0" r="3" fill="#fff"><animate attributeName="opacity" values="0.95;0.18;0.95" dur="2.8s" repeatCount="indefinite" /></circle>
    </g>
    <g transform="translate(910 75)">
      <rect x="-98" y="-25" width="196" height="50" rx="12" fill="#000" stroke="#fff" stroke-opacity="0.70" stroke-width="2" />
      <text y="8">PowerShell</text>
      <circle cx="-78" cy="0" r="3" fill="#fff"><animate attributeName="opacity" values="0.20;0.95;0.20" dur="2.4s" repeatCount="indefinite" /></circle>
    </g>
    <g transform="translate(1100 75)">
      <rect x="-66" y="-25" width="132" height="50" rx="12" fill="#000" stroke="#fff" stroke-opacity="0.70" stroke-width="2" />
      <text y="8">JSON</text>
      <circle cx="-46" cy="0" r="3" fill="#fff"><animate attributeName="opacity" values="0.25;1;0.25" dur="2.1s" repeatCount="indefinite" /></circle>
    </g>
  </g>

  <rect x="10" y="10" width="1180" height="130" rx="18" fill="none" stroke="#fff" stroke-opacity="0.18" stroke-width="6" />
</svg>

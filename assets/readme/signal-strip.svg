<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="92" viewBox="0 0 1200 92" role="img" aria-labelledby="title desc">
  <title id="title">Fateful release signal strip</title>
  <desc id="desc">Animated status strip showing release-only distribution signals.</desc>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5be7" />
      <stop offset="50%" stop-color="#6ed8ff" />
      <stop offset="100%" stop-color="#ffe879" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="92" rx="18" fill="#050719" />
  <rect x="8" y="8" width="1184" height="76" rx="14" fill="#0b1028" stroke="#375f9b" />

  <g transform="translate(32 21)" fill="url(#line)" filter="url(#glow)">
    <rect x="0" y="34" width="10" height="18"><animate attributeName="height" values="18;48;18" dur="1.2s" repeatCount="indefinite" /><animate attributeName="y" values="34;4;34" dur="1.2s" repeatCount="indefinite" /></rect>
    <rect x="18" y="22" width="10" height="30"><animate attributeName="height" values="30;12;44;30" dur="1.6s" repeatCount="indefinite" /><animate attributeName="y" values="22;40;8;22" dur="1.6s" repeatCount="indefinite" /></rect>
    <rect x="36" y="10" width="10" height="42"><animate attributeName="height" values="42;18;42" dur="1.1s" repeatCount="indefinite" /><animate attributeName="y" values="10;34;10" dur="1.1s" repeatCount="indefinite" /></rect>
    <rect x="54" y="28" width="10" height="24"><animate attributeName="height" values="24;50;24" dur="1.4s" repeatCount="indefinite" /><animate attributeName="y" values="28;2;28" dur="1.4s" repeatCount="indefinite" /></rect>
  </g>

  <g font-family="Consolas, Monaco, monospace" font-size="18" font-weight="700" fill="#cfefff" letter-spacing="2">
    <text x="130" y="56">RELEASE ONLY</text>
    <text x="352" y="56">EXE ONLY PACKAGE</text>
    <text x="642" y="56">HASH VERIFIED</text>
    <text x="880" y="56">CLOUDFRONT UPDATER</text>
  </g>

  <rect x="90" y="18" width="3" height="56" fill="#6ed8ff" opacity="0.55">
    <animate attributeName="x" values="90;1110;90" dur="5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.1;0.9;0.1" dur="5s" repeatCount="indefinite" />
  </rect>
  <path d="M106 74 H1094" stroke="url(#line)" stroke-width="2" stroke-linecap="square" stroke-dasharray="18 14" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" from="0" to="-128" dur="3s" repeatCount="indefinite" />
  </path>
</svg>

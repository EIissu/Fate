<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="92" viewBox="0 0 1200 92" role="img" aria-labelledby="title desc">
  <title id="title">Animated monochrome star field strip</title>
  <desc id="desc">A black and white wordless animated strip of stars, orbit dots, and a scanning comet line.</desc>
  <defs>
    <filter id="glow" x="-25%" y="-80%" width="150%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="stars" width="54" height="24" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="8" r="0.9" fill="#fff" opacity="0.45" />
      <circle cx="34" cy="18" r="0.7" fill="#fff" opacity="0.25" />
    </pattern>
  </defs>

  <rect width="1200" height="92" rx="18" fill="#000" />
  <rect x="8" y="8" width="1184" height="76" rx="14" fill="#060606" stroke="#fff" stroke-opacity="0.42" />
  <rect x="16" y="16" width="1168" height="60" rx="10" fill="url(#stars)">
    <animateTransform attributeName="transform" type="translate" values="0 0;-54 0;0 0" dur="12s" repeatCount="indefinite" />
  </rect>

  <path d="M64 47 C190 16, 312 80, 438 47 S686 16, 812 47 1064 80,1138 47" fill="none" stroke="#fff" stroke-opacity="0.32" stroke-width="1.5" stroke-dasharray="2 14">
    <animate attributeName="stroke-dashoffset" values="0;-96" dur="5s" repeatCount="indefinite" />
  </path>
  <path d="M68 47 H1132" stroke="#fff" stroke-opacity="0.24" stroke-width="1" stroke-dasharray="12 18">
    <animate attributeName="stroke-dashoffset" values="0;-120" dur="4s" repeatCount="indefinite" />
  </path>

  <g fill="#fff" filter="url(#glow)">
    <circle cx="132" cy="47" r="4">
      <animate attributeName="opacity" values="0.25;0.95;0.25" dur="2.2s" repeatCount="indefinite" />
    </circle>
    <circle cx="362" cy="47" r="2.5">
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.7s" repeatCount="indefinite" />
    </circle>
    <circle cx="600" cy="47" r="5">
      <animate attributeName="r" values="3;6;3" dur="2.4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite" />
    </circle>
    <circle cx="836" cy="47" r="2.5">
      <animate attributeName="opacity" values="0.85;0.18;0.85" dur="2.9s" repeatCount="indefinite" />
    </circle>
    <circle cx="1068" cy="47" r="4">
      <animate attributeName="opacity" values="0.2;0.95;0.2" dur="2.1s" repeatCount="indefinite" />
    </circle>
  </g>

  <g filter="url(#glow)">
    <circle cx="0" cy="0" r="3" fill="#fff" />
    <path d="M-58 0 H-8" stroke="#fff" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round" />
    <animateMotion dur="6s" repeatCount="indefinite" path="M70 24 C320 84, 540 18, 730 48 S1010 82,1132 30" />
  </g>

  <rect x="8" y="8" width="1184" height="76" rx="14" fill="none" stroke="#fff" stroke-opacity="0.22" stroke-width="6" />
</svg>
